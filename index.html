<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Experience</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Tahoma,sans-serif}
    html{scroll-behavior:smooth}
    body{background:#000;color:#fff;overflow-x:hidden;min-height:100vh}
    section{width:100%;padding:35px 18px;text-align:center}
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at center,#202020 0%,#050505 55%,#000 100%)}
    h1{font-size:44px;margin-bottom:12px;letter-spacing:1px;direction:ltr}
    h2{font-size:28px;margin-bottom:18px}
    p{font-size:18px;opacity:.82;line-height:1.7}
    .btn{display:inline-block;margin-top:28px;padding:13px 34px;border-radius:35px;background:#fff;color:#000;text-decoration:none;font-weight:bold;transition:.25s}
    .btn:hover{transform:scale(1.05)}
    .video-section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0b0b0b}
    video{width:90%;max-width:900px;border-radius:16px;box-shadow:0 0 35px rgba(255,255,255,.12);background:#111}
    .note{font-size:14px;opacity:.6;margin-top:12px;max-width:760px}
    .qr-section{min-height:75vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#050505;gap:12px}
    .qr-box{background:#fff;padding:12px;border-radius:16px;margin:8px auto;box-shadow:0 0 25px rgba(255,255,255,.12)}
    .qr-box img{width:220px;max-width:72vw;display:block}
    .character{position:fixed;right:14px;bottom:14px;width:120px;max-width:28vw;z-index:20;opacity:.94;filter:drop-shadow(0 0 12px rgba(255,255,255,.2));pointer-events:none}
    .fallback-link{color:#fff;text-decoration:underline;font-size:15px;opacity:.85}
    footer{text-align:center;padding:18px;background:#000;font-size:12px;opacity:.55;direction:ltr}
    @media(max-width:600px){h1{font-size:32px}h2{font-size:24px}p{font-size:16px}.character{width:85px}video{width:96%}}
  </style>
</head>
<body>

  <audio id="bgAudio" loop preload="auto">
    <source src="https://drive.google.com/uc?export=download&id=1fjYo5djOr1wcvS_WOI-9MtYm36Xvz1P_" type="audio/mpeg">
  </audio>

  <section class="hero">
    <h1>Project Experience</h1>
    <p>اضغط دخول للمتابعة وتشغيل التجربة</p>
    <a class="btn" href="#video" onclick="document.getElementById('bgAudio').play().catch(function(){});">دخول</a>
  </section>

  <section class="video-section" id="video">
    <h2>الفيديو</h2>
    <video controls muted playsinline preload="metadata">
      <source src="https://drive.google.com/uc?export=download&id=18CKejfEnruvH89TYe2h-PpGXv2styFGE" type="video/mp4">
      الفيديو غير مدعوم على هذا المتصفح.
    </video>
    <p class="note">إذا لم يظهر الفيديو، تأكدي أن ملف Google Drive مضبوط على: Anyone with the link can view.</p>
  </section>

  <section class="qr-section">
    <h2>امسح الكود</h2>
    <div class="qr-box">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https%3A%2F%2Fmywebar.com%2Fqr%2F927738" alt="QR Code">
    </div>
    <p>ادخل التجربة</p>
    <a class="fallback-link" href="https://mywebar.com/qr/927738" target="_blank" rel="noopener">فتح التجربة مباشرة</a>
  </section>

  <img class="character" src="https://drive.google.com/uc?export=download&id=1XsBBi4a9JhulChaOBN3SMqG1vB_LANnw" alt="Character">

  <footer>© Project Landing Page</footer>

</body>
</html>
